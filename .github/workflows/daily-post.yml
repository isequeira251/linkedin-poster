name: Daily LinkedIn Post

on:
  workflow_dispatch:
    inputs:
      override_date:
        description: 'YYYY-MM-DD to post (defaults to today)'
        required: false
        default: ''
  repository_dispatch:
    types: [daily-post]

jobs:
  post:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Human-like jitter (0-180s)
        run: |
          JITTER=$((RANDOM % 181))
          echo "Sleeping ${JITTER}s before posting..."
          sleep "$JITTER"

      - name: Run daily poster
        env:
          LINKEDIN_ACCESS_TOKEN: ${{ secrets.LINKEDIN_ACCESS_TOKEN }}
          LINKEDIN_PERSON_URN: ${{ secrets.LINKEDIN_PERSON_URN }}
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ANTHROPIC_MODEL: claude-sonnet-4-6
          OVERRIDE_DATE: ${{ inputs.override_date }}
          # Human-approved posts (sent to the +linkedin alias) take priority over
          # the auto notes pool. Omit these secrets to disable the approved path.
          GMAIL_ADDRESS: ${{ secrets.GMAIL_ADDRESS }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
        run: python daily_runner.py

      - name: Commit updated posts.json / notes.json
        run: |
          if git diff --quiet posts.json notes.json; then
            echo "No changes to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add posts.json notes.json
          git commit -m "Publish post for $(date -u +%Y-%m-%d)"
          git push
