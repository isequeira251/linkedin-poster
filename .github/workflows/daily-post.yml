name: Daily LinkedIn Post

on:
  workflow_dispatch:
    inputs:
      override_date:
        description: 'YYYY-MM-DD to post (defaults to today)'
        required: false
        default: ''
  repository_dispatch:
    types: [daily-post]

jobs:
  post:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Human-like jitter (0-180s)
        run: |
          JITTER=$((RANDOM % 181))
          echo "Sleeping ${JITTER}s before posting..."
          sleep "$JITTER"

      - name: Run daily poster
        env:
          LINKEDIN_ACCESS_TOKEN: ${{ secrets.LINKEDIN_ACCESS_TOKEN }}
          LINKEDIN_PERSON_URN: ${{ secrets.LINKEDIN_PERSON_URN }}
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
          OVERRIDE_DATE: ${{ inputs.override_date }}
        run: python daily_runner.py

      - name: Commit updated posts.json
        run: |
          if git diff --quiet posts.json; then
            echo "No changes to posts.json."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add posts.json
          git commit -m "Mark post as published for $(date -u +%Y-%m-%d)"
          git push
