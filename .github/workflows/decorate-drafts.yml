name: Decorate LinkedIn Drafts

# Attaches a generated card to each pending "LI POST" Gmail draft so Ian can
# review the visual before approving. Runs shortly after the cloud draft routine
# (which posts ~7:01am ET / 11:01 UTC) and again midday to catch later drafts.
# Idempotent: drafts that already carry a card are skipped.

on:
  workflow_dispatch:
    inputs:
      force:
        description: 'Re-card drafts that already have an image (regenerate graphics)'
        type: boolean
        default: false
  schedule:
    - cron: '25 11 * * 1-5'  # ~7:25am ET, just after the draft routine
    - cron: '0 16 * * 1-5'   # ~noon ET catch-up

jobs:
  decorate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Attach cards to pending drafts
        env:
          GMAIL_ADDRESS: ${{ secrets.GMAIL_ADDRESS }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
          FORCE_RECARD: ${{ inputs.force }}
        run: python decorate_drafts.py
