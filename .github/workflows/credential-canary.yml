name: Credential Canary

# Warns BEFORE an expiring secret silently breaks automation (LinkedIn 60-day
# token, Gmail app password, GitHub PAT). Emails Ian ONLY when something is
# failing or within WARN_DAYS of expiry — silence means healthy.
#
# To enable the proactive LinkedIn expiry countdown, add LINKEDIN_CLIENT_ID and
# LINKEDIN_CLIENT_SECRET as repo secrets (they're in Ian's local .env). Without
# them the check still catches a dead token, just reactively.

on:
  schedule:
    - cron: '0 13 * * 1'   # Mondays 13:00 UTC (~08:00–09:00 ET) — weekly
  workflow_dispatch: {}

jobs:
  canary:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Run credential canary
        env:
          LINKEDIN_ACCESS_TOKEN: ${{ secrets.LINKEDIN_ACCESS_TOKEN }}
          LINKEDIN_CLIENT_ID: ${{ secrets.LINKEDIN_CLIENT_ID }}
          LINKEDIN_CLIENT_SECRET: ${{ secrets.LINKEDIN_CLIENT_SECRET }}
          GH_MONITOR_TOKEN: ${{ secrets.GH_MONITOR_TOKEN }}
          GMAIL_ADDRESS: ${{ secrets.GMAIL_ADDRESS }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          MONITOR_RECIPIENT: ${{ secrets.MONITOR_RECIPIENT }}
        run: python credential_canary.py
